<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div class="container">
        <input type="text" id="display" class="display" disabled>

        <div class=" buttons">
            <div class="linha1">
                <button class="c-button">C</button>
                <button class="percent-button"><span class="material-symbols-outlined icon">percent</span></button>
                <button class="close-button"><span class="material-symbols-outlined icon">close</span></button>
                <button class="backspace-button"><span class="material-symbols-outlined icon">backspace</span></button>
            </div>
            <div class="linha2">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>÷</button>
            </div>
            <div class="linha3">
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="add-button"><span class="material-symbols-outlined icon">add</span></button>
            </div>
            <div class="linha4">
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="remove-button"><span class="material-symbols-outlined icon">remove</span></button>
            </div>
        </div>
    </div>
    
</body>
</html>
